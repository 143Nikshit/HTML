    <h1>HTML Multimedia - Audio & Video</h1>

    <h2>1. Simple Audio</h2>
    <audio src="../sound.m4a" controls></audio>
    <br><br>

    <h2>1. Autoplay Audio</h2>
    <audio src="../sound.m4a" autoplay muted controls></audio>
    <br><br>

    <h2>1. Loop Audio</h2>
    <audio src="../sound.m4a" loop controls></audio>
    <br><br>

    <h2>1. Simple Video</h2>
    <video src="../testvideo.mov" height="300" width="300" controls></video>
    <br><br>

    <h2>1. Autoplay Video</h2>
    <video src="../testvideo.mov" height="300" width="300" autoplay muted controls></video>
 

    <h2>1. Loop Video</h2>
    <video src="../testvideo.mov" height="300" width="300" loop controls></video>
   

    <h2>1. Video with poster</h2>
    <video src="../testvideo.mov" height="300" width="300" poster="./bgphoto.avif" controls></video>
  

    <h2>1. embeded Video</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/757f5VFJ-Kg?si=c9oXhuviQKj7fOFy"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <br><br>
